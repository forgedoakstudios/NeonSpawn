<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HTML5 Pacman</title>
<style>
@font-face {
  font-family: 'BDCartoonShoutRegular';
  src: url('BD_Cartoon_Shout-webfont.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#pacman-wrap {
  width: 342px;
  transform-origin: top center;
}
#shim {
  font-family: BDCartoonShoutRegular;
  position: absolute;
  visibility: hidden;
}
#pacman {
  height: 450px;
  width: 342px;
}
</style>
</head>
<body>
<div id="shim">shim</div>
<div id="pacman-wrap">
  <div id="pacman"></div>
</div>

<script src="modernizr-1.5.min.js"></script>
<script src="pacman.js"></script>
<script>
var el = document.getElementById("pacman");

// Scale to fit screen
function scaleGame() {
  var wrap = document.getElementById("pacman-wrap");
  var scaleX = window.innerWidth / 342;
  var scaleY = window.innerHeight / 450;
  var scale = Math.min(scaleX, scaleY, 1.5);
  wrap.style.transform = "scale(" + scale + ")";
}
scaleGame();
window.addEventListener("resize", scaleGame);

// Init with audio fallback
function initGame() {
  if (Modernizr.canvas && Modernizr.localstorage) {
    window.setTimeout(function() { PACMAN.init(el, "./"); }, 0);
  } else {
    el.innerHTML = '<p style="color:#FF2D78;font-family:sans-serif;padding:20px;text-align:center;">Sorry, your browser does not support this game.</p>';
  }
}

// Wait for font then init
document.fonts ? document.fonts.ready.then(initGame) : window.setTimeout(initGame, 300);
</script>
</body>
</html>
